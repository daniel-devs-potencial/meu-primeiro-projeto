<!-- Vídeo de Fundo -->
<div class="caixa-video-mario" id="inicio">
  <video
    src="video.mp4"
    autoplay
    muted
    loop
    playsinline
    preload="metadata"
    tabindex="-1"
    aria-hidden="true"
  ></video>

  <div
    class="mascara-video"
    onclick="sumirFormulario()"
    aria-label="Fechar formulário"
    role="button"
    tabindex="0"
    onkeydown="if(event.key==='Enter' || event.key===' '){ sumirFormulario(); }"
  ></div>
</div>
